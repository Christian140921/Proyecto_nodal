apiVersion: v1
kind: Service
metadata:
  name: mongo-eventos
  labels:
    app: mongo-eventos
spec:
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app: mongo-eventos
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-eventos
spec:
  selector:
    matchLabels:
      app: mongo-eventos
  template:
    metadata:
      labels:
        app: mongo-eventos
    spec:
      containers:
      - name: mongo
        image: mongo:7
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-eventos-data
          mountPath: /data/db
      volumes:
      - name: mongo-eventos-data
        emptyDir: {} # Switch to PVC for production

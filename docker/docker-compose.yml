version: '3.8'

services:
  mongo-noticias:
    image: mongo:7
    container_name: mongo-noticias
    restart: unless-stopped
    ports:
      - "27020:27017"
    volumes:
      - mongo-noticias-data:/data/db
    networks:
      - cqrs-network

  mongo-eventos:
    image: mongo:7
    container_name: mongo-eventos
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-eventos-data:/data/db
    networks:
      - cqrs-network

  strapi:
    build:
      context: ../strapi-cms
      dockerfile: ../docker/strapi.Dockerfile
    container_name: strapi-cms
    restart: unless-stopped
    ports:
      - "1337:1337"
    environment:
      - HOST=0.0.0.0
      - PORT=1337
    env_file:
      - ../strapi-cms/.env
    volumes:
      - strapi-data:/app/.tmp
      - strapi-uploads:/app/public/uploads
    networks:
      - cqrs-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-automation
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - cqrs-network

volumes:
  mongo-noticias-data:
  mongo-eventos-data:
  strapi-data:
  strapi-uploads:
  n8n_data:

networks:
  cqrs-network:
    driver: bridge
